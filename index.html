<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Reclaimer Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --accent-blue: #0078D4; /* Microsoft Blue */
            --danger-red: #D13438;
            --success-green: #107C10;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #005a9e; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 4px solid var(--accent-blue);
        }

        .stat-card h3 { margin: 0; font-size: 14px; color: #666; text-transform: uppercase;}
        .stat-card p { margin: 10px 0 0 0; font-size: 32px; font-weight: bold; }
        
        #savingsVal { color: var(--success-green); }
        #unusedVal { color: var(--danger-red); }

        table {
            width: 100%;
            background-color: var(--card-bg);
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th { background-color: #fafafa; font-weight: 600; }
        
        .flagged {
            color: var(--danger-red);
            font-weight: bold;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-active { background-color: #dff6dd; color: var(--success-green); }
        .status-stale { background-color: #fde7e9; color: var(--danger-red); }

        .loading { text-align: center; padding: 40px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Software Metering Engine</h1>
            <button id="refreshBtn">Refresh Telemetry</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tracked Installs</h3>
                <p id="totalVal">0</p>
            </div>
            <div class="stat-card" style="border-top-color: var(--danger-red);">
                <h3>Unused (>90 Days)</h3>
                <p id="unusedVal">0</p>
            </div>
            <div class="stat-card" style="border-top-color: var(--success-green);">
                <h3>Potential Monthly Savings</h3>
                <p id="savingsVal">$0</p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Device Name</th>
                    <th>User ID</th>
                    <th>Application</th>
                    <th>Last Opened</th>
                    <th>Days Unused</th>
                    <th>Status</th>
                    <th>Action</th> </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" class="loading">Awaiting connection to Azure Function...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // URL for fetching the telemetry data
        const AZURE_API_URL = "API of the first http trigger"; 
        
        const MOCK_LICENSE_COST = 35; // Assuming $35/month average for pro software

        async function fetchTelemetryData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="7" class="loading">Fetching secure data from Azure Log Analytics...</td></tr>';

            try {
                const response = await fetch(AZURE_API_URL);
                
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                
                const data = await response.json();
                
                renderDashboard(data);
                
            } catch (error) {
                console.error("Fetch failed:", error);
                tableBody.innerHTML = `<tr><td colspan="7" class="loading" style="color:red;">Error connecting to API. Did you paste the URL?</td></tr>`;
            }
        }

        function renderDashboard(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ''; // Clear loading text
            
            let staleCount = 0;

            // Loop through the JSON array and build the table rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                // Logic: If it hasn't been used in 90 days, flag it
                const isStale = row.DaysUnused > 0;
                if (isStale) staleCount++;

                const statusBadge = isStale 
                    ? `<span class="status-badge status-stale">Action Required</span>` 
                    : `<span class="status-badge status-active">Active</span>`;

                // Create a red button if the software is stale, otherwise just show text
                const actionButton = isStale 
                    ? `<button onclick="revokeLicense('${row.UserName_s}', '${row.Application_s}')" style="background-color: var(--danger-red); padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;">Revoke</button>`
                    : `<span style="color: #666; font-size: 12px;">Up to date</span>`;

                // Format the timestamp nicely
                const dateObj = new Date(row.LastUsed);
                const formattedDate = dateObj.toLocaleDateString();

                tr.innerHTML = `
                    <td><strong>${row.ComputerName_s}</strong></td>
                    <td>${row.UserName_s}</td>
                    <td>${row.Application_s}</td>
                    <td>${formattedDate}</td>
                    <td class="${isStale ? 'flagged' : ''}">${row.DaysUnused}</td>
                    <td>${statusBadge}</td>
                    <td>${actionButton}</td> `;
                tableBody.appendChild(tr);
            });

            // Update the KPI Cards at the top
            document.getElementById('totalVal').innerText = data.length;
            document.getElementById('unusedVal').innerText = staleCount;
            document.getElementById('savingsVal').innerText = `$${staleCount * MOCK_LICENSE_COST}`;
        }

        // --- NEW FUNCTION: Revoke License Action ---
        async function revokeLicense(username, application) {
            if (!confirm(`Are you sure you want to revoke ${application} for ${username}? This will remove them from the Entra ID group.`)) return;

            // IMPORTANT: We will paste the URL of your NEW Azure Function here later
            const REVOKE_API_URL = "API of revoke http trigger";

            try {
                alert(`Command sent. Attempting to revoke ${application} for ${username}...`);
                
                const response = await fetch(REVOKE_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, application: application })
                });

                if (response.ok) {
                    alert('Success! User removed from the licensing group.');
                    fetchTelemetryData(); // Refresh the table automatically
                } else {
                    alert('Failed to revoke license. Check the Azure backend logs.');
                }
            } catch (error) {
                console.error("Revoke failed:", error);
                alert('Network error communicating with the Revoke API. Ensure the URL is updated and CORS is configured.');
            }
        }

        // Connect the Refresh button
        document.getElementById('refreshBtn').addEventListener('click', fetchTelemetryData);

        // Auto-run when the page loads
        window.onload = fetchTelemetryData;
    </script>

</body>
</html>
